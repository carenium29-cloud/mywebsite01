version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: carenium
      POSTGRES_USER: carenium_admin
      POSTGRES_PASSWORD: enterprise_secure
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema_v5_optimized.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carenium_admin -d carenium"]
      interval: 10s
      timeout: 5s
      retries: 5

  spring-auth:
    build: 
      context: ./services/spring-auth
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/carenium
      SPRING_DATASOURCE_USERNAME: carenium_admin
      SPRING_DATASOURCE_PASSWORD: enterprise_secure
      CARENIUM_JWT_SECRET: ${JWT_SECRET:-9a4f2c3d5e6f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2c3d4e5f6a7b8c9d0e1f2a3b}
      CARENIUM_JWT_EXPIRATION: 86400000
    depends_on:
      db:
        condition: service_healthy

  fastapi-ai:
    build: 
      context: ./services/fastapi-ai
    ports:
      - "8000:8000"
    environment:
      API_ENV: production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  react-dashboard:
    build:
      context: ./services/react-dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - spring-auth
      - fastapi-ai

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - react-dashboard

volumes:
  pgdata:
