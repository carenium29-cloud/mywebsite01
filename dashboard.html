<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Carenium Dashboard — Real-time patient monitoring and healthcare management.">
    <meta name="theme-color" content="#0a8fd4">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Carenium — Doctor Dashboard</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>

<body>
    <div class="cosmic-bg">
        <div class="radial-glow"></div>
    </div>
    <div class="dashboard">
        <!-- Sidebar Overlay (Mobile) -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- Sidebar Navigation -->
        <aside class="sidebar glass-card" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M22 12h-4l-3 9L9 3l-3 9H2" />
                    </svg>
                </div>
                <span class="sidebar-brand">Carenium</span>
            </div>

            <nav class="sidebar-nav">
                <!-- Nav items rendered by JS -->
            </nav>

            <div class="sidebar-footer">
                <div class="sidebar-user">
                    <div class="user-avatar" id="userAvatar">?</div>
                    <div class="user-info">
                        <div class="user-name" id="userName">Loading...</div>
                        <div class="user-role-text" id="userRoleText">—</div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Top Header Bar -->
            <header class="top-header">
                <div class="header-left">
                    <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="3" y1="12" x2="21" y2="12" />
                            <line x1="3" y1="6" x2="21" y2="6" />
                            <line x1="3" y1="18" x2="21" y2="18" />
                        </svg>
                    </button>
                    <div class="branding">
                        <h1 id="hospitalName">Carenium Hospital</h1>
                    </div>
                </div>
                <div class="user-greeting">
                    <h2 id="topUserName">User</h2>
                    <div id="specBadgeContainer" class="spec-badge-container">
                        <span id="topRoleBadge" class="role-badge">Role</span>
                    </div>
                </div>
                <div class="header-right">
                    <!-- Notification Bell -->
                    <div class="notification-wrapper" id="notificationWrapper">
                        <button class="notification-bell" id="notificationBell" aria-label="Notifications"
                            onclick="Dashboard.switchSection('overview')">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
                                <path d="M13.73 21a2 2 0 0 1-3.46 0" />
                            </svg>
                            <span class="notification-count" id="notificationCount" style="display:none">0</span>
                        </button>
                    </div>

                    <!-- Online Status -->
                    <div class="online-status">
                        <span class="online-status-dot"></span>
                        <span class="btn-text">Online</span>
                    </div>

                    <div class="header-divider"></div>

                    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
                        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="5" />
                            <line x1="12" y1="1" x2="12" y2="3" />
                            <line x1="12" y1="21" x2="12" y2="23" />
                        </svg>
                        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                        </svg>
                    </button>

                    <div class="header-divider"></div>

                    <button class="pulse-btn" aria-label="Status">
                        <span class="pulse-dot"></span>
                        <span class="btn-text">System Live</span>
                    </button>
                </div>
            </header>


            <!-- Dashboard Dynamic Content -->
            <div class="dashboard-content" id="dashboardContent">
                <!-- Rendered by dashboard.js -->
            </div>
        </main>
    </div>

    <!-- Add Patient Modal -->
    <div class="modal" id="patientModal">
        <div class="modal-backdrop" onclick="UI.closeModal('patientModal')"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Medical Record Management</h2>
                <button class="modal-close" onclick="UI.closeModal('patientModal')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <!-- Data injected by modules -->
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="UI.closeModal('patientModal')">Close View</button>
                <button class="btn btn-primary" id="addPatientBtn">Save Medical Record</button>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Alert Sound -->
    <audio id="alertSound" preload="auto">
        <source src="data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgA" type="audio/wav">
    </audio>

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Core Infrastructure -->
    <script type="module" src="js/supabase-config.js"></script>
    <script type="module" src="js/particles.js"></script>
    <script type="module" src="js/ui.js"></script>
    <script type="module" src="js/demoData.js"></script>
    <script type="module" src="js/api.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/realtime.js"></script>
    <script type="module" src="js/theme.js"></script>

    <!-- Feature Modules -->
    <script type="module" src="js/alerts.js"></script>
    <script type="module" src="js/profile.js"></script>
    <script type="module" src="js/patients.js"></script>
    <script type="module" src="js/doctor-actions.js"></script>
    <script type="module" src="js/appointments.js"></script>
    <script type="module" src="js/staff.js"></script>

    <!-- App Controller -->
    <script type="module" src="js/dashboard.js"></script>
</body>

</html>
