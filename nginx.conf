# Nginx Configuration for Carenium Enterprise

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Gzip Compression
    gzip  on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml+rss text/javascript;

    server {
        listen       80;
        server_name  localhost;

        # Frontend
        location / {
            proxy_pass http://react-dashboard:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Auth API
        location /api/auth {
            proxy_pass http://spring-auth:8080/api/auth;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # AI Engine & WebSockets
        location /ws/alerts {
            proxy_pass http://fastapi-ai:8000/ws/alerts;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
        }

        location /ai/ {
            proxy_pass http://fastapi-ai:8000/;
            proxy_set_header Host $host;
        }

        # Error Pages
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }
}
