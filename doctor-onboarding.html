<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Carenium — Complete your doctor profile to get started with the platform.">
    <meta name="theme-color" content="#0a8fd4">
    <title>Carenium — Doctor Onboarding</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/onboarding.css">
</head>

<body>
    <div class="onboarding-page">
        <!-- Background -->
        <div class="onboarding-bg">
            <div class="blob blob-1"></div>
            <div class="blob blob-2"></div>
            <div class="blob blob-3"></div>
        </div>

        <!-- Onboarding Card -->
        <div class="onboarding-card">
            <!-- Logout Button -->
            <button type="button" class="btn-logout" id="logoutBtn" title="Sign Out">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                    <polyline points="16 17 21 12 16 7" />
                    <line x1="21" y1="12" x2="9" y2="12" />
                </svg>
                <span>Sign Out</span>
            </button>

            <div class="onboarding-header">
                <div class="brand">
                    <svg viewBox="0 0 120 120" width="56" height="56">
                        <defs>
                            <linearGradient id="gradBlue" x1="0" y1="0" x2="1" y2="1">
                                <stop offset="0%" stop-color="#0a8fd4" />
                                <stop offset="100%" stop-color="#005f99" />
                            </linearGradient>
                        </defs>
                        <path d="M60 5 L110 30 V70 C110 95 85 115 60 115
                                 C35 115 10 95 10 70 V30 Z" fill="url(#gradBlue)" />
                        <polyline points="25,65 40,65 48,50 60,85 72,60 95,60" stroke="#ffffff" stroke-width="5"
                            fill="none" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    <div>
                        <h1 class="brand-title">Welcome, Doctor</h1>
                        <p class="brand-subtitle">Complete your specialist profile to begin</p>
                    </div>
                </div>
            </div>

            <!-- Progress Steps -->
            <div class="onboarding-steps">
                <div class="step active" data-step="1">
                    <div class="step-number">1</div>
                    <span>Specialization</span>
                </div>
                <div class="step-line"></div>
                <div class="step" data-step="2">
                    <div class="step-number">2</div>
                    <span>Credentials</span>
                </div>
                <div class="step-line"></div>
                <div class="step" data-step="3">
                    <div class="step-number">3</div>
                    <span>Availability</span>
                </div>
            </div>

            <!-- Error Alert -->
            <div class="onboarding-error" id="onboardingError">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10" />
                    <line x1="15" y1="9" x2="9" y2="15" />
                    <line x1="9" y1="9" x2="15" y2="15" />
                </svg>
                <span id="onboardingErrorText">Error</span>
            </div>

            <!-- STEP 1: Specialization & Experience -->
            <form class="onboarding-form" id="onboardingForm" novalidate>
                <div class="form-step active" id="formStep1">
                    <div class="form-group">
                        <label for="specialization">Specialization <span class="required">*</span></label>
                        <select class="form-input" id="specialization" required>
                            <option value="" disabled selected>Select your specialization</option>
                            <option value="General Physician">General Physician</option>
                            <option value="Cardiologist">Cardiologist</option>
                            <option value="Dermatologist">Dermatologist</option>
                            <option value="Orthopedic Surgeon">Orthopedic Surgeon</option>
                            <option value="Gastroenterologist">Gastroenterologist</option>
                            <option value="Endocrinologist">Endocrinologist</option>
                            <option value="Neurologist">Neurologist</option>
                            <option value="ENT Specialist">ENT Specialist</option>
                            <option value="Urologist">Urologist</option>
                            <option value="Gynecologist / Obstetrician">Gynecologist / Obstetrician</option>
                            <option value="Psychiatrist">Psychiatrist</option>
                            <option value="Ophthalmologist">Ophthalmologist</option>
                            <option value="Pulmonologist">Pulmonologist</option>
                            <option value="Oncologist">Oncologist</option>
                            <option value="Allergist / Immunologist">Allergist / Immunologist</option>
                            <option value="Pediatrician">Pediatrician</option>
                            <option value="Neonatologist">Neonatologist</option>
                            <option value="Andrologist">Andrologist</option>
                            <option value="Audiologist">Audiologist</option>
                            <option value="Hematologist">Hematologist</option>
                            <option value="Hepatologist">Hepatologist</option>
                            <option value="Nephrologist">Nephrologist</option>
                            <option value="Rheumatologist">Rheumatologist</option>
                            <option value="Physiatrist">Physiatrist</option>
                            <option value="Podiatrist">Podiatrist</option>
                            <option value="Cardiothoracic Surgeon">Cardiothoracic Surgeon</option>
                            <option value="Neurosurgeon">Neurosurgeon</option>
                            <option value="Plastic Surgeon">Plastic Surgeon</option>
                            <option value="Vascular Surgeon">Vascular Surgeon</option>
                            <option value="Anesthesiologist">Anesthesiologist</option>
                            <option value="Pathologist">Pathologist</option>
                            <option value="Radiologist">Radiologist</option>
                            <option value="Infectious Disease Specialist">Infectious Disease Specialist</option>
                            <option value="Geriatrician">Geriatrician</option>
                        </select>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="experienceYears">Years of Experience <span class="required">*</span></label>
                            <input type="number" class="form-input" id="experienceYears" min="0" max="60"
                                placeholder="e.g. 8" required>
                        </div>
                        <div class="form-group">
                            <label for="department">Department <span class="required">*</span></label>
                            <input type="text" class="form-input" id="department" placeholder="e.g. Internal Medicine"
                                required>
                        </div>
                    </div>

                    <div class="form-actions">
                        <div></div>
                        <button type="button" class="btn btn-primary" onclick="Onboarding.nextStep(2)">
                            Continue
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18"
                                height="18">
                                <polyline points="9 18 15 12 9 6" />
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- STEP 2: Credentials -->
                <div class="form-step" id="formStep2">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="qualification">Qualification <span class="required">*</span></label>
                            <input type="text" class="form-input" id="qualification"
                                placeholder="e.g. MBBS, MD Cardiology" required>
                        </div>
                        <div class="form-group">
                            <label for="licenseNumber">Medical License No. <span class="required">*</span></label>
                            <input type="text" class="form-input" id="licenseNumber" placeholder="e.g. MCI-12345"
                                required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="unit">Clinic / Hospital Unit</label>
                        <input type="text" class="form-input" id="unit" placeholder="e.g. Cardiology Unit B, Floor 3">
                    </div>

                    <div class="form-group">
                        <label for="bio">Professional Bio <span class="optional">(optional)</span></label>
                        <textarea class="form-input form-textarea" id="bio" rows="3"
                            placeholder="Brief professional summary..."></textarea>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" onclick="Onboarding.prevStep(1)">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18"
                                height="18">
                                <polyline points="15 18 9 12 15 6" />
                            </svg>
                            Back
                        </button>
                        <button type="button" class="btn btn-primary" onclick="Onboarding.nextStep(3)">
                            Continue
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18"
                                height="18">
                                <polyline points="9 18 15 12 9 6" />
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- STEP 3: Availability -->
                <div class="form-step" id="formStep3">
                    <div class="form-group">
                        <label>Consultation Availability <span class="required">*</span></label>
                        <div class="availability-grid">
                            <label class="day-toggle">
                                <input type="checkbox" name="day" value="monday" checked> <span>Mon</span>
                            </label>
                            <label class="day-toggle">
                                <input type="checkbox" name="day" value="tuesday" checked> <span>Tue</span>
                            </label>
                            <label class="day-toggle">
                                <input type="checkbox" name="day" value="wednesday" checked> <span>Wed</span>
                            </label>
                            <label class="day-toggle">
                                <input type="checkbox" name="day" value="thursday" checked> <span>Thu</span>
                            </label>
                            <label class="day-toggle">
                                <input type="checkbox" name="day" value="friday" checked> <span>Fri</span>
                            </label>
                            <label class="day-toggle">
                                <input type="checkbox" name="day" value="saturday"> <span>Sat</span>
                            </label>
                            <label class="day-toggle">
                                <input type="checkbox" name="day" value="sunday"> <span>Sun</span>
                            </label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="shift">Preferred Shift</label>
                        <select class="form-input" id="shift">
                            <option value="morning">Morning (8 AM - 2 PM)</option>
                            <option value="afternoon">Afternoon (2 PM - 8 PM)</option>
                            <option value="night">Night (8 PM - 8 AM)</option>
                            <option value="flexible">Flexible</option>
                        </select>
                    </div>

                    <!-- Summary Preview -->
                    <div class="profile-preview glass-panel" id="profilePreview">
                        <h4>Profile Preview</h4>
                        <div class="preview-grid" id="previewGrid">
                            <!-- Populated by JS -->
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" onclick="Onboarding.prevStep(2)">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18"
                                height="18">
                                <polyline points="15 18 9 12 15 6" />
                            </svg>
                            Back
                        </button>
                        <button type="submit" class="btn btn-primary btn-lg" id="submitBtn">
                            <span class="btn-text">Complete Setup</span>
                            <span class="spinner"></span>
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Core -->
    <script type="module" src="js/supabase-config.js"></script>
    <script type="module" src="js/ui.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/api.js"></script>
    <script type="module" src="js/theme.js"></script>
    <script type="module" src="js/onboarding.js"></script>
</body>

</html>
